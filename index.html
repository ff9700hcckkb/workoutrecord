<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>腹魚川馬線</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { background-color: #0f172a; color: #f1f5f9; font-family: sans-serif; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .card { background-color: #1e293b; border: 1px solid #334155; }
    </style>
</head>
<body class="min-h-screen pb-10">

    <div class="max-w-2xl mx-auto px-4 pt-8">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-bold text-white flex items-center gap-2">
                <span class="text-indigo-400">⚡</span> 腹魚川馬線
            </h1>
            <button onclick="toggleView()" id="toggleBtn" class="bg-indigo-600 text-white px-5 py-2 rounded-lg shadow-lg hover:bg-indigo-500 transition font-medium">
                查看細項
            </button>
        </div>

        <div id="main-view" class="tab-content active">
            <div id="total-hours-container" class="card p-8 rounded-3xl mb-6 text-center shadow-2xl shadow-indigo-900/20">
                <p class="text-slate-400 text-sm font-medium tracking-widest uppercase">累計總時數</p>
                <p id="total-hours" class="text-5xl font-black text-indigo-400 mt-2">--</p>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-6" id="summary-grid">
                <div class="card p-6 rounded-2xl animate-pulse text-center">載入中...</div>
            </div>

            <div id="rank-view" class="mt-6">
                <div class="card p-6 rounded-3xl border-indigo-500/30 shadow-lg shadow-indigo-900/10 text-center" id="rank-container">
                    <p class="text-slate-400 text-xs font-bold uppercase tracking-widest">載入排名中...</p>
                </div>
            </div>
        </div>

        <div id="detail-view" class="tab-content">
            <h2 class="text-lg font-semibold mb-4 text-slate-300 px-1">歷史訓練</h2>
            <div id="detail-list" class="space-y-4">
                </div>
        </div>
    </div>

    <script>
        // 請確保這兩個網址正確
        const summaryCsvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTlQ1F2GUSFPG8I-xiSDDA4wRZPk3wYGpRfozap84xk9ZZmk_74qjJGCDX9TbXJZmHKqnY-pdJgqIJG/pub?gid=500074129&single=true&output=csv'; 
        const detailCsvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTlQ1F2GUSFPG8I-xiSDDA4wRZPk3wYGpRfozap84xk9ZZmk_74qjJGCDX9TbXJZmHKqnY-pdJgqIJG/pub?gid=0&single=true&output=csv';

        let isDetailView = false;

        function loadSummary() {
            Papa.parse(summaryCsvUrl, {
                download: true, 
                header: true,
                complete: function(results) {
                    const d = results.data[0];
                    if (!d) return;

                    // 1. 顯示累計時數
                    document.getElementById('total-hours').innerText = d['累計時數'] || '00:00:00';

                    // 2. 四個數據方塊 (置中且加大)
                    const fields = [
                        { label: '總訓練日', value: d['總訓練日'], color: 'text-blue-400' },
                        { label: '中斷次數', value: d['中斷次數'], color: 'text-pink-400' },
                        { label: '連續達成', value: d['連續達成'], color: 'text-amber-400' },
                        { label: '最高連續', value: d['最高連續'], color: 'text-emerald-400' }
                    ];
                    document.getElementById('summary-grid').innerHTML = fields.map(f => `
                        <div class="card p-6 rounded-2xl text-center">
                            <p class="text-slate-400 text-xs font-bold uppercase tracking-wider mb-2">${f.label}</p>
                            <p class="text-4xl font-black ${f.color}">${f.value || 0}</p>
                        </div>
                    `).join('');

                    // 3. 大框框顯示歌手排名 (處理 H1 公式產生的換行符號)
                    const rankText = d['歌手排名'] ? d['歌手排名'].replace(/\n/g, '<br>') : '暫無排名資料';
                    
                    document.getElementById('rank-container').innerHTML = `
                        <div class="mb-4">
                            <p class="text-slate-400 text-xs font-bold uppercase tracking-widest">🏆 熱門歌手排名 🏆</p>
                        </div>
                        <div class="text-indigo-100 text-lg font-medium leading-relaxed">
                            ${rankText}
                        </div>
                        <div class="mt-4 pt-4 border-t border-slate-700/50">
                            <p class="text-slate-500 text-xs tracking-wide">累計播放次數：${d['播放次數'] || 0}</p>
                        </div>
                    `;
                }
            });
        }

        function loadDetails() {
            Papa.parse(detailCsvUrl, {
                download: true, 
                header: true,
                complete: function(results) {
                    const grouped = {};
                    results.data.forEach(row => {
                        if(!row.日期 || row.日期 === '日期') return;
                        if(!grouped[row.日期]) {
                            grouped[row.日期] = { totalTime: row.時間小計 || '--', items: [] };
                        }
                        grouped[row.日期].items.push({
                            name: `${row.歌手} - ${row.歌名}`,
                            duration: row.時間 || ''
                        });
                    });

                    // 依日期倒序排列 (假設日期格式為 YYYY/MM/DD)
                    const sortedDates = Object.keys(grouped).sort((a, b) => new Date(b) - new Date(a));

                    const listHtml = sortedDates.map(date => `
                        <div class="card rounded-xl overflow-hidden shadow-lg mb-4">
                            <button onclick="toggleAccordion(this)" class="w-full px-5 py-4 flex justify-between items-center hover:bg-slate-700/50 transition">
                                <div class="text-left">
                                    <p class="font-bold text-white">${date}</p>
                                    <p class="text-xs text-slate-400 mt-1">總計時間：${grouped[date].totalTime}</p>
                                </div>
                                <span class="text-slate-500 text-sm font-mono">DETAIL ▾</span>
                            </button>
                            <div class="hidden px-5 py-4 bg-slate-800/50 border-t border-slate-700">
                                <ul class="text-sm space-y-3">
                                    ${grouped[date].items.map(item => `
                                        <li class="flex justify-between items-center border-b border-slate-700/50 pb-2 last:border-0">
                                            <span class="text-slate-300">${item.name}</span>
                                            <span class="text-indigo-400 font-mono text-xs">${item.duration}</span>
                                        </li>
                                    `).join('')}
                                </ul>
                            </div>
                        </div>
                    `).join('');
                    document.getElementById('detail-list').innerHTML = listHtml || '<p class="text-center text-slate-500">尚無資料</p>';
                }
            });
        }

        function toggleAccordion(btn) {
            const content = btn.nextElementSibling;
            content.classList.toggle('hidden');
        }

        function toggleView() {
            isDetailView = !isDetailView;
            const main = document.getElementById('main-view');
            const detail = document.getElementById('detail-view');
            const btn = document.getElementById('toggleBtn');

            if (isDetailView) {
                main.classList.remove('active');
                detail.classList.add('active');
                btn.innerText = '返回總覽';
                loadDetails();
            } else {
                detail.classList.remove('active');
                main.classList.add('active');
                btn.innerText = '查看細項';
            }
        }

        // 初始化
        loadSummary();
    </script>
</body>
</html>
